name: Build & upload to Firebase App Distribution
on:
  workflow_dispatch:
    inputs:
      release_notes:
        type: string
        default: 'Automated build from GitHub Actions'
        required: true
        description: 'Release notes for the build'
      branch:
        description: 'Branch to run the action on'
        required: true
        default: 'main'
      action:
        description: 'Select the action to run'
        required: true
        default: 'build'
        options:
          - build
          - test
          - deploy

jobs:
  build:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      # Checkout the code
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}

      # Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Build the APK
      - name: Build APK
        run: ./gradlew assembleDebug
      #
      #      # Optional: Upload the APK as an artifact
      #      - name: Upload APK
      #        uses: actions/upload-artifact@v4
      #        with:
      #          name: app-debug.apk
      #          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Authenticate with Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > ${{ github.workspace }}/serviceAccount.json

      - name: Distribute APK to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
          groups: internal-testers
          file: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          releaseNotes: ${{inputs.release_notes}}


